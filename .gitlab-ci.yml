stages:
  - qualify
  - build
  - deploy

# 1. Gitleaks Scan (Using official Docker image)
gitleaks_qualify:
  stage: qualify
  image: 
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    # We look for the config file in the repo root now
    - gitleaks detect --source . --verbose 
  # Use tags ONLY if you want to force it to your Windows runner
  # tags:
  #   - windows 

# 2. Maven Build
maven_build:
  stage: build
  image: maven:3.8-openjdk-11 # Or your preferred version
  script:
    - mvn clean package
  artifacts:
    paths:
      - target/*.war

# 3. Tomcat Deploy
tomcat_deploy:
  stage: deploy
  image: maven:3.8-openjdk-11
  script:
    - mvn tomcat7:deploy
